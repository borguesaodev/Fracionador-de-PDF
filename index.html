<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divisor de PDF</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap&family=Corinthia:wght@400;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS (Framework) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- CSS Personalizado — estados, variantes e classes utilitárias próprias -->
    <link rel="stylesheet" href="css/styles.css">

    <!-- Bibliotecas Externas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-800">

    <!-- Header fixo -->

    <header class="fixed top-0 left-0 w-full bg-white border-b border-slate-200 px-6 py-3 flex items-center shadow-sm z-40">
    <a href="https://borguesaodev.github.io/site/" class="btn-voltar">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
        Voltar
    </a>

    <!--Marca centrada no header -->
    <a href="https://borguesaodev.github.io/site/" class="absolute left-1/2 -translate-x-1/2 text-slate-800"
       style="font-family: 'Corinthia', cursive; font-size: 2.25rem; font-weight: 600; letter-spacing: 0.01em;">
        Borguesao Dev<span>.</span>
    </a>
</header>

    <!-- <header class="fixed top-0 left-0 w-full bg-white border-b border-slate-200 px-6 py-3 flex items-center shadow-sm z-40">
        <button href="" class="btn-voltar">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
            Voltar
        </button>
    </header> -->

    <!-- Conteúdo principal: centralizado vertical e horizontalmente, com padding-top para compensar o header -->
    <main class="flex items-center justify-center min-h-[calc(100vh-3.5rem)] pt-16 px-4 py-8">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-2xl overflow-hidden border border-slate-100">

            <!-- Cabeçalho do card -->
            <div class="bg-blue-600 p-6 text-white text-center">
                <h1 class="text-3xl font-bold mb-2 flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    Divisor de PDF
                </h1>
                <p class="text-blue-100 text-sm">Fracione documentos respeitando páginas e limites de tamanho.</p>
            </div>

            <div class="p-8">

                <!-- Configurações -->
                <div class="mb-6 flex items-center justify-between bg-slate-50 p-4 rounded-lg border border-slate-200">
                    <label for="maxSize" class="font-medium text-slate-700 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        Tamanho máximo por ficheiro (MB):
                    </label>
                    <input type="number" id="maxSize" value="4" min="1" max="50" step="0.5"
                        class="w-24 px-3 py-2 border border-slate-300 rounded-md text-center font-bold text-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <!-- Área de Upload (Drag & Drop) -->
                <div id="dropzone" class="border-2 border-dashed border-slate-300 rounded-xl p-10 text-center cursor-pointer transition-all duration-200 hover:bg-slate-50 group">
                    <input type="file" id="fileInput" accept="application/pdf" class="hidden">
                    <div class="flex flex-col items-center justify-center pointer-events-none">
                        <svg class="w-12 h-12 text-slate-400 group-hover:text-blue-500 mb-4 transition-colors" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                        </svg>
                        <p class="text-lg font-semibold text-slate-700 mb-1" id="fileNameDisplay">Arraste o seu PDF para aqui</p>
                        <p class="text-sm text-slate-500">ou clique para procurar no seu computador</p>
                    </div>
                </div>

                <!-- Botão de Ação -->
                <button id="processBtn" disabled class="btn-processar">
                    <svg id="btnIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                    </svg>
                    <span id="btnLabel">Iniciar Fracionamento</span>
                </button>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="w-full bg-white border-t border-slate-200 px-6 py-3 flex items-center justify-between">
        <a href="https://borguesaodev.github.io/site/" class="text-slate-800" style="font-family: 'Corinthia', cursive; font-size: 2.25rem; font-weight: 600; letter-spacing: 0.01em;">Borguesao Dev<span>.</span></a>
        <p class="text-sm text-slate-500">
            © 2026 <a href="#" class="text-blue-600 hover:underline font-medium">Alysson Borguesão</a>. Todos os direitos reservados
        </p>
    </footer>

    <!-- Overlay de Carregamento -->
    <div id="loadingOverlay" class="fixed inset-0 z-50 hidden bg-slate-900/40 backdrop-blur-sm flex-col items-center justify-center transition-opacity duration-300 opacity-0">
        <div class="bg-white/70 backdrop-blur-lg p-8 rounded-2xl shadow-2xl flex flex-col items-center max-w-sm w-11/12 text-center border border-white/50">
            <svg class="animate-spin h-12 w-12 text-blue-600 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <h3 class="text-xl font-bold text-slate-800 mb-2">A Processar...</h3>
            <p id="overlayMessage" class="msg-base msg-info">A iniciar o fracionamento...</p>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
